# ============================================================================
# ResiliaMap — docker-compose.resiliamap.yml
# ----------------------------------------------------------------------------
# Stack for ResiliaMap ONLY. Does NOT touch the existing Arcep Dockerfile or
# services. Host ports are shifted off the Arcep defaults (Arcep uses :8000).
#
# Services:
#   db       postgis/postgis:16-3.4    (PostgreSQL 16 + PostGIS 3.4)
#   tileserv pramsey/pg_tileserv       (vector tiles from v_poi_tiles + coverage)
#   api      Bun + Elysia (api/)       (read-only JSON/GeoJSON API)
#   web      Vite build -> nginx       (SPA + reverse proxy /api and /tiles)
#   ingest   Bun + GDAL (ingest/)      (one-shot loaders; profile "tools")
#
# Network: resiliamap_net   Volume: resiliamap_pgdata
#
# Usage:
#   cp .env.resiliamap.example .env.resiliamap   # then edit
#   docker compose -f docker-compose.resiliamap.yml --env-file .env.resiliamap up -d db tileserv api web
#   docker compose -f docker-compose.resiliamap.yml --env-file .env.resiliamap run --rm ingest
#
# License: AGPL-3.0-or-later (ResiliaMap new code). See README.ResiliaMap.md.
# ============================================================================

name: resiliamap

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: resiliamap_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resiliamap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-resiliamap}
    ports:
      - "${DB_HOST_PORT:-5440}:5432"
    volumes:
      - resiliamap_pgdata:/var/lib/postgresql/data
      # Schema is applied on first boot (empty data dir) via the official
      # postgres entrypoint, in lexical order. Re-applying later: `make db-init`.
      - ./db/00_extensions.sql:/docker-entrypoint-initdb.d/00_extensions.sql:ro
      - ./db/resilience.sql:/docker-entrypoint-initdb.d/10_resilience.sql:ro
      # v2 feature objects (score_snapshot, snapshot_resilience_score(),
      # v_department_resilience, v_commune_outage_hotspots). Lexical order 20_
      # ensures it runs AFTER 10_resilience.sql, on which it depends.
      - ./db/v2_features.sql:/docker-entrypoint-initdb.d/20_v2_features.sql:ro
      # Read-only role for API + tileserv. Lexical 30_ runs LAST (after the
      # CASCADE drop/recreate in 10_resilience.sql) so its grants survive.
      - ./db/30_roles.sql:/docker-entrypoint-initdb.d/30_roles.sql:ro
      # E4 data-quality run log (ingest_run). 40_ runs after the RO role exists.
      - ./db/data_quality.sql:/docker-entrypoint-initdb.d/40_data_quality.sql:ro
      # E3 alerts (alert_subscription, alert_event). 50_ after critical_poi exists.
      - ./db/alerts.sql:/docker-entrypoint-initdb.d/50_alerts.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resiliamap} -d ${POSTGRES_DB:-resiliamap}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - resiliamap_net

  tileserv:
    image: pramsey/pg_tileserv:latest
    container_name: resiliamap_tileserv
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # pg_tileserv reads DATABASE_URL. Default to the read-only role (db/30_roles.sql).
      DATABASE_URL: ${TILESERV_DATABASE_URL:-postgres://resiliamap_ro:changeme_local_only@db:5432/resiliamap}
    command: ["--config", "/config/pg_tileserv.toml"]
    volumes:
      - ./tileserv/pg_tileserv.toml:/config/pg_tileserv.toml:ro
    ports:
      - "${TILESERV_HOST_PORT:-7801}:7800"
    networks:
      - resiliamap_net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: resiliamap_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://resiliamap:changeme_local_only@db:5432/resiliamap}
      API_PORT: ${API_PORT:-3801}
      # In production an unset/`*` CORS_ORIGIN denies cross-origin (web is served
      # same-origin via the nginx proxy below). Set an explicit allowlist to opt in.
      NODE_ENV: ${NODE_ENV:-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    ports:
      - "${API_PORT:-3801}:${API_PORT:-3801}"
    networks:
      - resiliamap_net

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # Baked into the static bundle at build time. Empty base => same-origin
        # requests (/api/...), which the web nginx proxies to the api service.
        # (The frontend reads import.meta.env.VITE_API_URL — see web/src/api.ts.)
        # Empty default keeps the nginx same-origin proxy (/api); an operator who
        # sets VITE_API_URL in .env.resiliamap gets it baked into the bundle.
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: resiliamap_web
    restart: unless-stopped
    depends_on:
      - api
      - tileserv
    environment:
      API_UPSTREAM: api:${API_PORT:-3801}
      TILESERV_UPSTREAM: tileserv:7800
    ports:
      - "${WEB_HOST_PORT:-8081}:80"
    networks:
      - resiliamap_net

  # One-shot ingestion container. Run on demand, not part of `up`.
  #   docker compose -f docker-compose.resiliamap.yml run --rm ingest          # run_all
  #   docker compose -f docker-compose.resiliamap.yml run --rm ingest bun run src/cron_outages.ts
  ingest:
    build:
      context: ./ingest
      dockerfile: Dockerfile
    container_name: resiliamap_ingest
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://resiliamap:changeme_local_only@db:5432/resiliamap}
      OUTAGE_BASE_URL: ${OUTAGE_BASE_URL:-https://object.files.data.gouv.fr/arcep/sites-indisponibles/all}
      R_METERS: ${R_METERS:-3000}
      OUTAGE_WINDOW_DAYS: ${OUTAGE_WINDOW_DAYS:-90}
    volumes:
      - ./ingest/data/raw:/app/data/raw
    networks:
      - resiliamap_net

volumes:
  resiliamap_pgdata:
    name: resiliamap_pgdata

networks:
  resiliamap_net:
    name: resiliamap_net
