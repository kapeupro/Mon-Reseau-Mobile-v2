{% extends "base.html" %} {% block title %} Page import {% endblock %} {% block
content %}
<div
    class="mask d-flex align-items-center h-100"
    style="background-color: rgba(255, 255, 255)"
>
    <div class="container">
        <div class="justify-content-center">
            <div class="" style="background-color: aliceblue">
                <h4>IMPORT</h4>
                <form action="{% url 'home' %}" method="post">
                    {% csrf_token %}
                    <!-- <label for="page_options">Choisir une option :</label> -->
                    <div class="form-outline mb-4">
                        <label class="form-label" for="page_options"
                            >Type de données</label
                        >
                    </div>

                    <div class="form-outline mb-4">
                        <select name="page_options" id="page_options">
                            <option value="couvertures">Couvertures</option>
                            <option value="sites">Sites</option>
                            <option value="qos">QoS {% APP_MODE %}</option>
                            {% if APP_MODE == "private" %}
                            <option value="admin">Admin</option>
                            <option value="operateur">Operateur</option>
                            <option value="import_log">Import Log</option>
                            <option value="data_source_list">
                                Data source
                            </option>
                            {% endif %}
                        </select>
                    </div>

                    <!-- <button type="submit">Aller à la page sélectionnée</button> -->
                    <button
                        type="submit"
                        class="btn btn-primary btn-block mb-4"
                    >
                        Aller à la page sélectionnée
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
