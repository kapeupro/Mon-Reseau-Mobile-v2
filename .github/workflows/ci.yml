# ============================================================================
# ResiliaMap — CI (typecheck + unit tests + web build)
# ----------------------------------------------------------------------------
# Scoped to the ResiliaMap stack (api/, ingest/, web/). The unit suite (D6) is
# deliberately DB-free, so CI needs no Postgres service — it runs fast.
# The legacy Arcep app (back_mrm/front_mrm) is out of scope (Golden Rule #1).
# License: AGPL-3.0-or-later.
# ============================================================================
name: ci

on:
  pull_request:
    paths: [api/**, ingest/**, web/**, db/**, "*.yml", Makefile]
  push:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: api } }
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.9" }
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test

  ingest:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ingest } }
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.9" }
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      # DATABASE_URL unset on purpose — proves the lazy pool (db.test.ts).
      - run: bun test

  web:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.9" }
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run build
